services:
  # --- Kafka (image officielle Apache, mode KRaft, sans ZooKeeper) ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: velib-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # --- Kafka UI (visualisation des messages — captures jury) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: velib-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=velib-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # --- MinIO (Data Lake S3-compatible) ---
  minio:
    image: minio/minio:latest
    container_name: velib-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Producer 1 : disponibilité temps réel → Kafka ---
  producer-availability:
    build: ./producers
    container_name: velib-producer-availability
    command: python velib_availability.py
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=velib.station_status
      - POLL_INTERVAL=60
    depends_on:
      kafka:
        condition: service_healthy

  # --- Producer 2 : référentiel stations → Kafka ---
  producer-stations:
    build: ./producers
    container_name: velib-producer-stations
    command: python velib_stations.py
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=velib.station_information
      - POLL_INTERVAL=600
    depends_on:
      kafka:
        condition: service_healthy

  # --- Producer 3 : météo OpenWeatherMap → Kafka ---
  producer-weather:
    build: ./producers
    container_name: velib-producer-weather
    command: python weather.py
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=velib.weather
      - POLL_INTERVAL=600
    depends_on:
      kafka:
        condition: service_healthy
  # --- Création automatique des buckets MinIO (RAW/CLEAN/CURATED) ---
  minio-setup:
    image: minio/mc:latest
    container_name: velib-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/raw &&
      mc mb --ignore-existing local/clean &&
      mc mb --ignore-existing local/curated &&
      echo 'Buckets RAW/CLEAN/CURATED prêts' &&
      exit 0
      "

  # --- Spark (traitement streaming Kafka → MinIO) ---
  # --- Spark (traitement streaming Kafka → MinIO) ---
  spark:
    image: apache/spark:3.5.3
    container_name: velib-spark
    user: root
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - MINIO_ENDPOINT=http://minio:9000
    volumes:
      - ./spark:/app
      - spark-ivy:/root/.ivy2
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.hadoop:hadoop-aws:3.3.4
      /app/raw_ingestion.py
  
  # --- Spark CLEAN (RAW → CLEAN) ---
  spark-clean:
    image: apache/spark:3.5.3
    container_name: velib-spark-clean
    user: root
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - MINIO_ENDPOINT=http://minio:9000
    volumes:
      - ./spark:/app
      - spark-ivy:/root/.ivy2
    depends_on:
      minio:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.hadoop:hadoop-aws:3.3.4
      /app/clean_processing.py

  # --- Spark CURATED (CLEAN → CURATED, batch) ---
  spark-curated:
    image: apache/spark:3.5.3
    container_name: velib-spark-curated
    user: root
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - BATCH_INTERVAL=120
    volumes:
      - ./spark:/app
      - spark-ivy:/root/.ivy2
    depends_on:
      minio:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.hadoop:hadoop-aws:3.3.4
      /app/curated_processing.py

  # --- Kafka Exporter (expose les métriques Kafka à Prometheus) ---
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: velib-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  # --- Prometheus (collecte des métriques) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: velib-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
    depends_on:
      - kafka-exporter

  # --- Grafana (dashboards de supervision) ---
  grafana:
    image: grafana/grafana:latest
    container_name: velib-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=velibadmin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

  # --- Great Expectations (tests qualité des données) ---
  great-expectations:
    build: ./great_expectations
    container_name: velib-great-expectations
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
      
volumes:
  minio-data:
  spark-ivy:
  grafana-data: