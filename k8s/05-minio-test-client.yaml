apiVersion: v1
kind: Pod
metadata:
  name: minio-test-client
  namespace: velibdata
  labels:
    app: minio-test-client
spec:
  restartPolicy: Never
  containers:
    - name: mc
      image: minio/mc:latest
      imagePullPolicy: IfNotPresent
      command:
        - "/bin/sh"
        - "-c"
        - "trap 'exit 0' TERM INT; sleep 3600 & wait"
      envFrom:
        - secretRef:
            name: minio-creds
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
