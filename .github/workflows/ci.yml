name: CI - VélibData Platform
on: [push]

jobs:
  validate-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Compose configuration
        run: docker compose config

      - name: Validate Python syntax
        run: python -m py_compile $(git ls-files '*.py')

      - name: Check required project files
        run: test -f docker-compose.yml

      - name: Check documentation files
        run: test -f docs/runbook_maintenance.md

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17 (requis par Spark 3.5.3)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests (schema, transformation, quality)
        run: python -m pytest tests/ -v
